<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkyCast Pro | Advanced Weather Intelligence</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

:root {
    --glass: rgba(15, 23, 42, 0.6);
    --glass-border: rgba(255, 255, 255, 0.1);
}

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: radial-gradient(circle at top right, #1e293b, #0f172a);
    color: #f8fafc;
    min-height: 100vh;
}

.glass-panel {
    background: var(--glass);
    backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 1.5rem;
}

.active-tab {
    background: #3b82f6;
    color: white;
}

.custom-scrollbar::-webkit-scrollbar {
    height: 5px;
}
.custom-scrollbar::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
}
</style>
</head>

<body class="p-3 md:p-8">

<div class="max-w-6xl mx-auto space-y-6">

<!-- HEADER -->
<header class="flex flex-col md:flex-row items-center justify-between gap-4">

    <div class="flex items-center gap-3">
        <div class="bg-blue-600 p-2 rounded-xl">
            <i data-lucide="cloud-lightning" class="text-white w-6 h-6"></i>
        </div>
        <h1 class="text-2xl font-bold">SkyCast <span class="text-blue-500">Pro</span></h1>
    </div>

    <div class="flex items-center gap-2 w-full md:max-w-md">
        <div class="relative flex-1">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
            <input id="searchInput"
            placeholder="Search city..."
            class="w-full glass-panel bg-transparent pl-10 pr-4 py-2.5 text-sm">
        </div>

        <button id="searchBtn" class="glass-panel p-2.5">
            <i data-lucide="search"></i>
        </button>

        <button id="locateBtn" class="glass-panel p-2.5">
            <i data-lucide="map-pin"></i>
        </button>
    </div>

    <div class="flex glass-panel p-1">
        <button id="unitC" class="active-tab px-3 py-1 text-xs">°C</button>
        <button id="unitF" class="px-3 py-1 text-xs">°F</button>
    </div>

</header>

<!-- MAIN -->
<main class="grid grid-cols-1 lg:grid-cols-12 gap-4 md:gap-6">

<!-- LEFT -->
<section class="lg:col-span-4 space-y-4 md:space-y-6">

<div class="glass-panel p-6 md:p-8 text-center relative">

<button id="favBtn" class="absolute top-4 right-4">
<i data-lucide="heart"></i>
</button>

<h2 class="city-name text-2xl md:text-3xl">---</h2>
<p class="date-string text-slate-400 text-sm">---</p>

<img id="mainIcon" class="mx-auto w-24 md:w-32">

<h1 class="temp-display text-5xl md:text-7xl lg:text-8xl">--°</h1>

<p class="weather-desc text-blue-400 text-sm md:text-base">---</p>

<div class="grid grid-cols-2 gap-4 mt-6 text-sm md:text-base">
<p class="humidity-val">--%</p>
<p class="wind-val">-- km/h</p>
</div>

</div>

<div class="glass-panel p-4 md:p-6">
<h3 class="text-sm md:text-base font-semibold">Air Quality</h3>
<p class="aqi-idx text-sm md:text-base">--</p>
</div>

</section>

<!-- RIGHT -->
<section class="lg:col-span-8 space-y-4 md:space-y-6">

<div class="glass-panel p-4 md:p-6">
<h3 class="mb-3 font-semibold">24-Hour Forecast</h3>

<div class="hourly-container flex gap-4 overflow-x-auto pb-2 custom-scrollbar">
</div>
</div>

<div class="glass-panel p-4 md:p-6">
<h3 class="mb-3 font-semibold">7-Day Forecast</h3>

<div class="daily-container space-y-3">
</div>
</div>

</section>

</main>
</div>

<!-- ERROR -->
<div id="errorUI"
class="hidden fixed top-10 left-1/2 -translate-x-1/2 glass-panel p-4 text-sm">
<span id="errorMessage"></span>
</div>

<script type="module" src="main.js"></script>

<script>
lucide.createIcons();
</script>

</body>
</html>
